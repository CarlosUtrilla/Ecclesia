name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-universal:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Validate GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN no está configurado en GitHub Secrets"
            exit 1
          fi

      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h /
          # Simulators
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes || true
          xcrun simctl delete all 2>/dev/null || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true
          # Android SDK
          sudo rm -rf /usr/local/lib/android || true
          # .NET SDK
          sudo rm -rf /usr/local/share/dotnet || true
          # Homebrew
          brew cleanup --prune=all -q 2>/dev/null || true
          sudo rm -rf /opt/homebrew/Caches 2>/dev/null || true
          # Hosted toolcache
          sudo rm -rf /opt/hostedtoolcache 2>/dev/null || true
          # Xcode platforms no necesarias para builds de Electron (iOS, watchOS, tvOS, visionOS)
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneSimulator.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/WatchOS.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/WatchSimulator.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/AppleTVOS.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/AppleTVSimulator.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/XROS.platform || true
          sudo rm -rf /Applications/Xcode.app/Contents/Developer/Platforms/XRSimulator.platform || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Set TMPDIR to workspace volume
        run: |
          mkdir -p /Users/runner/work/tmp
          echo "TMPDIR=/Users/runner/work/tmp" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: yarn install --frozen-lockfile

      - name: Build and publish (macOS universal)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:ci:mac -- --universal --publish always

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Validate GH_TOKEN
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN no está configurado en GitHub Secrets"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: yarn install --frozen-lockfile

      - name: Build and publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:ci:win -- --publish always
