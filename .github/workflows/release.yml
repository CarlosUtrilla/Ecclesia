name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes || true
          xcrun simctl delete all || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm ci --legacy-peer-deps

      - name: Build and publish (macOS arm64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:ci:mac -- --arm64 --publish always

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes || true
          xcrun simctl delete all || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm ci --legacy-peer-deps

      - name: Build and publish (macOS x64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:ci:mac -- --x64 --publish always

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm ci --legacy-peer-deps

      - name: Build and publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:ci:win -- --publish always
