<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Ecclesia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 20px;
    }

    body {
      background: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 24px rgba(0, 0, 0, 0.25));
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 10px;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
    }

    .status-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    #status {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.75;
      letter-spacing: 0.3px;
      transition: opacity 0.15s ease;
      min-height: 18px;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0.5);
        opacity: 0.35;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <img id="logo" class="logo" alt="Ecclesia" />
  <h1>Ecclesia</h1>
  <div class="status-wrap">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span id="status">Iniciando...</span>
  </div>
  <script type="module" src="./splash-renderer.ts"></script>
</body>

</html>
