appId: com.ecclesia.app
productName: Ecclesia
directories:
  buildResources: build
files:
  - '**/*'
  - from: 'node_modules/.prisma'
    to: 'node_modules/.prisma'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: prisma
    to: prisma
    filter:
      - '**/*'
      - '!dev.db-journal'
  - from: resources/bibles
    to: bibles
    filter:
      - '**/*.ebbl'
asarUnpack:
  - resources/**
  - node_modules/.prisma/**
  - node_modules/@prisma/**
  - node_modules/prisma/**
  - prisma/**/*
  - node_modules/@ffmpeg-installer/**
  - node_modules/sharp/**
win:
  executableName: Ecclesia
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
afterPack: ./scripts/after-pack.cjs
mac:
  identity: null
  notarize: false
  # En build universal, estos archivos de firma pueden diferir entre arm64/x64
  # aunque el contenido de la app sea equivalente.
  singleArchFiles: '**/Contents/Frameworks/*Framework.framework/**/_CodeSignature/**'
  # zip es necesario para que electron-updater instale sin pasar por Squirrel.Mac.
  # Squirrel requiere Code Signing y falla con "did not pass validation" cuando
  # la app no está firmada. Con zip, electron-updater gestiona la actualización
  # directamente sin invocar Squirrel.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: CarlosUtrilla
  repo: Ecclesia
  channel: latest
  releaseType: release
